<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hours Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <img class="brand-logo" src="iomtt-logo.svg" alt="Isle of Man TT Races" />
          <div class="brand-copy">
            <p class="eyebrow">Hours log</p>
            <h1>Hours Tracker</h1>
          </div>
        </div>

        <div class="topbar-actions" aria-label="File actions">
          <label class="filename-field">
            <span>Excel file</span>
            <input
              id="excelFileName"
              type="text"
              value="June_2026_Caitlin_Beaty"
              pattern="^(January|February|March|April|May|June|July|August|September|October|November|December)_[0-9]{4}_Caitlin_Beaty$"
              title="Use Month_Year_Caitlin_Beaty"
            />
          </label>
          <input
            id="fileImport"
            class="visually-hidden"
            type="file"
            accept=".csv,.xls,.xlsx,text/csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
          />
          <button id="importFileButton" class="icon-button" type="button" title="Import CSV or Excel" aria-label="Import CSV or Excel">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <path d="M7 10l5-5 5 5" />
              <path d="M12 5v12" />
            </svg>
          </button>
          <button id="exportCsv" class="icon-button" type="button" title="Export CSV" aria-label="Export CSV">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <path d="M7 10l5 5 5-5" />
              <path d="M12 15V3" />
            </svg>
          </button>
          <button id="exportExcel" class="icon-button" type="button" title="Export Excel" aria-label="Export Excel">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" />
              <path d="M14 2v6h6" />
              <path d="M8 13h8" />
              <path d="M8 17h8" />
              <path d="M8 9h2" />
            </svg>
          </button>
          <button id="clearAll" class="icon-button danger" type="button" title="Clear all rows" aria-label="Clear all rows">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M3 6h18" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />
            </svg>
          </button>
        </div>
      </header>

      <main>
        <section class="summary-grid" aria-label="Hours totals">
          <article class="metric-card">
            <span>Total hours</span>
            <strong id="totalHours">0.00</strong>
          </article>
          <article class="metric-card">
            <span>Total cash</span>
            <strong id="totalCash">&pound;0.00</strong>
          </article>
          <article class="metric-card">
            <span>Entries</span>
            <strong id="entryCount">0</strong>
          </article>
          <article class="metric-card">
            <span>Days logged</span>
            <strong id="dayCount">0</strong>
          </article>
        </section>

        <section class="work-area">
          <form id="entryForm" class="entry-form" autocomplete="off">
            <div class="form-header">
              <h2 id="formTitle">Add hours</h2>
              <button id="cancelEdit" class="ghost-button" type="button" hidden>Cancel</button>
            </div>

            <input id="editingId" type="hidden" />

            <label>
              <span>Date</span>
              <input id="dateWorked" name="dateWorked" type="date" />
            </label>

            <label>
              <span>Hours</span>
              <input id="hoursQty" name="hoursQty" type="number" min="0" step="0.25" inputmode="decimal" />
            </label>

            <label>
              <span>Amount per hour</span>
              <input id="cashAmount" name="cashAmount" type="number" value="18.00" min="0" step="0.01" inputmode="decimal" readonly />
            </label>

            <label>
              <span>Total for date</span>
              <input id="dateTotal" name="dateTotal" type="text" value="&pound;0.00" readonly />
            </label>

            <button class="primary-button" type="submit">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z" />
                <path d="M17 21v-8H7v8" />
                <path d="M7 3v5h8" />
              </svg>
              <span id="submitLabel">Save hours</span>
            </button>
          </form>

          <section class="records-panel" aria-label="Hours records">
            <div class="records-toolbar">
              <div class="search-box">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <circle cx="11" cy="11" r="8" />
                  <path d="M21 21l-4.35-4.35" />
                </svg>
                <input id="searchInput" type="search" placeholder="Search rows" />
              </div>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th><button type="button" data-sort="dateWorked">Date</button></th>
                    <th><button type="button" data-sort="hoursQty">Hours</button></th>
                    <th><button type="button" data-sort="cashAmount">Amount per hour</button></th>
                    <th><button type="button" data-sort="totalForDate">Total for date</button></th>
                    <th class="actions-heading">Actions</th>
                  </tr>
                </thead>
                <tbody id="recordsBody"></tbody>
              </table>
              <div id="emptyState" class="empty-state" hidden>No hours rows yet.</div>
            </div>
          </section>
        </section>
      </main>
    </div>

    <template id="rowTemplate">
      <tr>
        <td data-field="dateWorked"></td>
        <td data-field="hoursQty" class="numeric"></td>
        <td data-field="cashAmount" class="numeric"></td>
        <td data-field="totalForDate" class="numeric"></td>
        <td class="row-actions">
          <button class="icon-button small edit-row" type="button" title="Edit row" aria-label="Edit row">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
          </button>
          <button class="icon-button small danger delete-row" type="button" title="Delete row" aria-label="Delete row">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M3 6h18" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
            </svg>
          </button>
        </td>
      </tr>
    </template>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
